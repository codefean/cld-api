<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<title>Causal Loop Diagram Generator</title>
<meta name="description" content="Generate causal loop diagrams from a simple text format. Detects reinforcing and balancing feedback loops. Exports to .svg, .rda, .csv, and plain text. Embed CLDs on your website with the CLD API." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com/3.4.1"></script>

<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://unpkg.com/lucide@1.14.0/dist/umd/lucide.min.js"></script>

<style>
  html, body {
    background: #ffffff;
    font-family: 'Geist', ui-sans-serif, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: #171717;
    -webkit-font-smoothing: antialiased;
    margin: 0;
    -webkit-tap-highlight-color: transparent;
  }
  textarea, code, pre, .mono {
    font-family: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .tabular-nums { font-variant-numeric: tabular-nums; }
  #root:empty::before {
    content: 'Loading…';
    display: block;
    padding: 4rem;
    color: #a8a29e;
    font-size: 0.875rem;
  }
  svg.cld-canvas { touch-action: none; }
  .cld-node-grab { cursor: grab; }
  .cld-node-grab:active { cursor: grabbing; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, forwardRef, useImperativeHandle } = React;

function Icon({ name, size = 14, color, strokeWidth = 2, className = "" }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide || !window.lucide[name]) return;
    ref.current.innerHTML = "";
    const attrs = { width: size, height: size, "stroke-width": strokeWidth };
    if (color) attrs.stroke = color;
    const node = window.lucide.createElement(window.lucide[name], attrs);
    ref.current.appendChild(node);
  }, [name, size, color, strokeWidth]);
  return <span ref={ref} className={"inline-flex items-center justify-center " + className} style={{ width: size, height: size }} />;
}

function parseConnections(text) {
  const lines = text.split("\n").map((l) => l.trim()).filter(Boolean);
  const edges = [];
  const errors = [];
  const stripComment = (s) => s.replace(/#.*$/, "").trim();
  const polarityRe = /[\s(]*([+\-])[)\s]*$/;
  const arrowRe = /\s*(?:->|→|=>|\bcauses\b|\bleads to\b)\s*/i;

  lines.forEach((raw, idx) => {
    const line = stripComment(raw);
    if (!line) return;
    const polMatch = line.match(polarityRe);
    if (!polMatch) {
      errors.push(`Line ${idx + 1}: missing polarity (+ or -)`);
      return;
    }
    const polarity = polMatch[1] === "+" ? "+" : "-";
    const body = line.slice(0, polMatch.index).trim().replace(/[,:]\s*$/, "");
    const parts = body.split(arrowRe);
    if (parts.length !== 2) {
      errors.push(`Line ${idx + 1}: arrow not found`);
      return;
    }
    const clean = (s) => s.trim().replace(/^["'`]|["'`]$/g, "").replace(/\s+/g, " ");
    const source = clean(parts[0]);
    const target = clean(parts[1]);
    if (!source || !target) {
      errors.push(`Line ${idx + 1}: empty variable name`);
      return;
    }
    edges.push({ source, target, polarity });
  });
  return { edges, errors };
}

function findLoops(edges) {
  const adj = new Map();

  edges.forEach((e, idx) => {
    if (!adj.has(e.source)) adj.set(e.source, []);
    adj.get(e.source).push({
      target: e.target,
      polarity: e.polarity,
      edgeId: idx,
    });
  });

  const allNodes = Array.from(
    new Set(edges.flatMap((e) => [e.source, e.target]))
  ).sort();

  const cycles = [];
  const seen = new Set();

  function canonicalCycle(nodes, polarities) {
    const n = nodes.length;
    const variants = [];

    for (let i = 0; i < n; i++) {
      const rotatedNodes = nodes.slice(i).concat(nodes.slice(0, i));
      const rotatedPols = polarities.slice(i).concat(polarities.slice(0, i));
      variants.push({
        key: rotatedNodes.join("→") + "|" + rotatedPols.join(""),
        nodes: rotatedNodes,
        polarities: rotatedPols,
      });
    }

    variants.sort((a, b) => a.key.localeCompare(b.key));
    return variants[0];
  }

  function dfs(start, current, path, polarities, visited) {
    const neighbors = adj.get(current) || [];

    for (const { target, polarity } of neighbors) {
      if (target === start) {
        const cycleNodes = [...path, current];
        const cyclePols = [...polarities, polarity];

        const canonical = canonicalCycle(cycleNodes, cyclePols);

        if (!seen.has(canonical.key)) {
          seen.add(canonical.key);

          const negCount = canonical.polarities.filter((p) => p === "-").length;

          cycles.push({
            nodes: canonical.nodes,
            polarities: canonical.polarities,
            type: negCount % 2 === 0 ? "R" : "B",
          });
        }

        continue;
      }

      if (visited.has(target)) continue;

      visited.add(target);
      dfs(
        start,
        target,
        [...path, current],
        [...polarities, polarity],
        visited
      );
      visited.delete(target);
    }
  }

  for (const start of allNodes) {
    dfs(start, start, [], [], new Set([start]));
  }

  cycles.sort((a, b) => {
    if (a.type !== b.type) return a.type.localeCompare(b.type);
    if (a.nodes.length !== b.nodes.length) return a.nodes.length - b.nodes.length;
    return a.nodes.join("→").localeCompare(b.nodes.join("→"));
  });

  return cycles.filter((c) => c.nodes.length <= 60);
}

function formatLoopPath(loop) {
  return loop.nodes
    .map((node, i) => {
      const next = loop.nodes[(i + 1) % loop.nodes.length];
      const polarity = loop.polarities[i];
      return `${node} --(${polarity})--> ${next}`;
    })
    .join("  ");
}

function writeRDA(edges) {
  const chunks = [];
  let totalLen = 0;
  const push = (arr) => { chunks.push(arr); totalLen += arr.length; };
  const i32 = (n) => {
    const b = new Uint8Array(4);
    new DataView(b.buffer).setInt32(0, n | 0, false);
    return b;
  };
  const NILVALUE_SXP = 254, LISTSXP = 2, SYMSXP = 1, CHARSXP = 9, STRSXP = 16, VECSXP = 19, INTSXP = 13;
  const flag = (type, hasAttr = false, hasTag = false, levels = 0) => {
    let f = type & 0xff;
    if (hasAttr) f |= 1 << 9;
    if (hasTag) f |= 1 << 10;
    f |= (levels & 0xffff) << 12;
    return f;
  };
  const writeCHARSXP = (str) => {
    const bytes = new TextEncoder().encode(str);
    push(i32(flag(CHARSXP, false, false, 8)));
    push(i32(bytes.length));
    push(bytes);
  };
  const writeSymbol = (name) => { push(i32(flag(SYMSXP))); writeCHARSXP(name); };
  const writeSTRSXP = (strings) => {
    push(i32(flag(STRSXP)));
    push(i32(strings.length));
    strings.forEach((s) => writeCHARSXP(s));
  };

  push(new TextEncoder().encode("RDX2\nX\n"));
  push(i32(2));
  push(i32(0x00040200));
  push(i32(0x00020300));

  push(i32(flag(LISTSXP, false, true)));
  writeSymbol("cld");

  const ncol = 3;
  const nrow = edges.length;
  push(i32(flag(VECSXP, true)));
  push(i32(ncol));
  writeSTRSXP(edges.map((e) => e.source));
  writeSTRSXP(edges.map((e) => e.target));
  writeSTRSXP(edges.map((e) => e.polarity));

  push(i32(flag(LISTSXP, false, true)));
  writeSymbol("names");
  writeSTRSXP(["from", "to", "polarity"]);

  push(i32(flag(LISTSXP, false, true)));
  writeSymbol("row.names");
  push(i32(flag(INTSXP)));
  push(i32(2));
  push(i32(-2147483648));
  push(i32(-nrow));

  push(i32(flag(LISTSXP, false, true)));
  writeSymbol("class");
  writeSTRSXP(["data.frame"]);

  push(i32(NILVALUE_SXP));
  push(i32(NILVALUE_SXP));

  const out = new Uint8Array(totalLen);
  let off = 0;
  chunks.forEach((c) => { out.set(c, off); off += c.length; });
  return out;
}

function buildLoopReport(edges, loops) {
  const nodes = new Set();
  edges.forEach((e) => { nodes.add(e.source); nodes.add(e.target); });
  const lines = [];
  lines.push("CAUSAL LOOP DIAGRAM");
  lines.push("===================");
  lines.push(`Generated: ${new Date().toISOString()}`);
  lines.push(`Variables: ${nodes.size}`);
  lines.push(`Links: ${edges.length}`);
  const rCount = loops.filter((l) => l.type === "R").length;
  const bCount = loops.filter((l) => l.type === "B").length;
  lines.push(`Feedback loops: ${loops.length} (${rCount} reinforcing, ${bCount} balancing)`);
  lines.push("");
  lines.push("VARIABLES");
  lines.push("---------");
  Array.from(nodes).sort().forEach((n) => lines.push(`  ${n}`));
  lines.push("");
  lines.push("LINKS");
  lines.push("-----");
  edges.forEach((e) => lines.push(`  ${e.source} --(${e.polarity})--> ${e.target}`));
  lines.push("");
  lines.push("FEEDBACK LOOPS");
  lines.push("--------------");
  if (loops.length === 0) {
    lines.push("  (none detected)");
  } else {
    loops.forEach((loop, i) => {
      const label = loop.type === "R" ? "REINFORCING" : "BALANCING";
      const negCount = loop.polarities.filter((p) => p === "-").length;
      lines.push(`Loop ${i + 1} [${loop.type}] — ${label}`);
      lines.push(`  Length: ${loop.nodes.length} variables, ${negCount} negative link${negCount === 1 ? "" : "s"}`);
      lines.push(`  Path:   ${formatLoopPath(loop)}`);
      lines.push("");
    });
  }
  return lines.join("\n");
}

function buildLoopsOnly(loops) {
  if (loops.length === 0) return "No feedback loops detected.";
  const out = [];
  loops.forEach((loop, i) => {
    const label = loop.type === "R" ? "REINFORCING" : "BALANCING";
    const negCount = loop.polarities.filter((p) => p === "-").length;
    out.push(`Loop ${i + 1} [${loop.type}] — ${label}`);
    out.push(`  Length: ${loop.nodes.length} variables, ${negCount} negative link${negCount === 1 ? "" : "s"}`);
    out.push(`  Path:   ${formatLoopPath(loop)}`);
    out.push("");
  });
  return out.join("\n").trimEnd();
}

const CLDDiagram = forwardRef(function CLDDiagram({ edges }, ref) {
  const svgRef = useRef(null);
  const wrapperRef = useRef(null);
  const [dims, setDims] = useState({ w: 800, h: 500 });
  const [isMobile, setIsMobile] = useState(false);

  useImperativeHandle(ref, () => ({
    getSvgNode: () => svgRef.current,
  }));

  useEffect(() => {
    if (!wrapperRef.current) return;
    const ro = new ResizeObserver(() => {
      const rect = wrapperRef.current.getBoundingClientRect();
      const w = rect.width;
      const mobile = w < 640;
      setIsMobile(mobile);
      const h = mobile
        ? Math.max(360, Math.min(window.innerHeight * 0.55, w * 1.0))
        : Math.max(440, w * 0.62);
      setDims({ w, h });
    });
    ro.observe(wrapperRef.current);
    return () => ro.disconnect();
  }, []);

  const { nodes, links } = useMemo(() => {
    const nodeMap = new Map();
    edges.forEach((e) => {
      if (!nodeMap.has(e.source)) nodeMap.set(e.source, { id: e.source });
      if (!nodeMap.has(e.target)) nodeMap.set(e.target, { id: e.target });
    });
    return {
      nodes: Array.from(nodeMap.values()),
      links: edges.map((e, i) => ({
        source: e.source, target: e.target, polarity: e.polarity, idx: i,
      })),
    };
  }, [edges]);

  useEffect(() => {
    if (!svgRef.current || nodes.length === 0) return;
    const d3 = window.d3;
    const svg = d3.select(svgRef.current);
    svg.selectAll("*").remove();
    const { w, h } = dims;

    // The visible SVG is only the viewport. The simulation uses a larger
    // virtual workspace so users can zoom out, pan, and spread nodes apart.
    const worldScale = isMobile ? 2.2 : 2.8;
    const worldW = Math.max(w * worldScale, isMobile ? 900 : 1600);
    const worldH = Math.max(h * worldScale, isMobile ? 760 : 1200);
    const initialTransform = d3.zoomIdentity.translate(
      w / 2 - worldW / 2,
      h / 2 - worldH / 2
    );

    const pairKey = (a, b) => [a, b].sort().join("|");
    const linkGroups = new Map();
    links.forEach((l) => {
      const k = pairKey(l.source, l.target);
      if (!linkGroups.has(k)) linkGroups.set(k, []);
      linkGroups.get(k).push(l);
    });
    links.forEach((l) => {
      const group = linkGroups.get(pairKey(l.source, l.target));
      const total = group.length;
      if (total === 1) {
        l._curve = 0;
      } else {
        const idxInGroup = group.indexOf(l);
        const direction = l.source < l.target ? 1 : -1;
        l._curve = (idxInGroup - (total - 1) / 2) * 0.6 * direction;
      }
    });

    const linkDist = isMobile ? 130 : 170;
    const charge = isMobile ? -520 : -720;
    const collide = isMobile ? 56 : 72;

    const sim = d3
      .forceSimulation(nodes)
      .force("link", d3.forceLink(links).id((d) => d.id).distance(linkDist).strength(0.4))
      .force("charge", d3.forceManyBody().strength(charge))
      .force("center", d3.forceCenter(worldW / 2, worldH / 2))
      .force("collision", d3.forceCollide().radius(collide));

    const defs = svg.append("defs");
    const makeMarker = (id, color) => {
      defs.append("marker")
        .attr("id", id).attr("viewBox", "0 -5 10 10").attr("refX", 9).attr("refY", 0)
        .attr("markerWidth", 6).attr("markerHeight", 6).attr("orient", "auto")
        .append("path").attr("d", "M0,-5L10,0L0,5").attr("fill", color);
    };
    makeMarker("arrow-pos", "#0f766e");
    makeMarker("arrow-neg", "#b91c1c");

    const g = svg.append("g");

    const zoomBehavior = d3.zoom()
      .scaleExtent([0.18, 3])
      .translateExtent([
        [-worldW * 0.25, -worldH * 0.25],
        [worldW * 1.25, worldH * 1.25],
      ])
      .filter((event) => {
        return !event.button && !event.target.closest(".cld-node");
      })
      .on("zoom", (event) => {
        g.attr("transform", event.transform);
      });

    svg.call(zoomBehavior);
    svg.call(zoomBehavior.transform, initialTransform);

    g.append("rect")
      .attr("x", 0)
      .attr("y", 0)
      .attr("width", worldW)
      .attr("height", worldH)
      .attr("fill", "#fafaf9")
      .attr("stroke", "#e7e5e4")
      .attr("stroke-width", 1)
      .attr("pointer-events", "all");

    const linkSel = g.append("g")
      .selectAll("path")
      .data(links)
      .join("path")
      .attr("fill", "none")
      .attr("stroke", (d) => (d.polarity === "+" ? "#0f766e" : "#b91c1c"))
      .attr("stroke-width", isMobile ? 1.8 : 1.6)
      .attr("marker-end", (d) =>
        d.polarity === "+" ? "url(#arrow-pos)" : "url(#arrow-neg)"
      )
      .attr("opacity", 0.9);

    const labelSel = g.append("g")
      .selectAll("g")
      .data(links)
      .join("g");

    const labelR = isMobile ? 10 : 9;
    labelSel.append("circle")
      .attr("r", labelR)
      .attr("fill", "#ffffff")
      .attr("stroke", (d) => (d.polarity === "+" ? "#0f766e" : "#b91c1c"))
      .attr("stroke-width", 1.2);

    labelSel.append("text")
      .attr("text-anchor", "middle").attr("dominant-baseline", "central")
      .attr("font-size", isMobile ? 13 : 12).attr("font-weight", 600)
      .attr("fill", (d) => (d.polarity === "+" ? "#0f766e" : "#b91c1c"))
      .text((d) => d.polarity);

    const nodeG = g.append("g")
      .selectAll("g")
      .data(nodes)
      .join("g")
      .attr("class", "cld-node cld-node-grab")
      .call(
        d3.drag()
          .on("start", (event, d) => {
            if (!event.active) sim.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
          })
          .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
          .on("end", (event, d) => {
            if (!event.active) sim.alphaTarget(0);
            d.fx = null; d.fy = null;
          })
      );

    const measureFontSize = isMobile ? 14 : 13;
    const measure = svg.append("text").attr("visibility", "hidden").attr("font-size", measureFontSize);
    nodes.forEach((n) => {
      measure.text(n.id);
      n._w = Math.max(isMobile ? 70 : 64, measure.node().getComputedTextLength() + (isMobile ? 28 : 24));
      n._h = isMobile ? 36 : 32;
    });
    measure.remove();

    nodeG.append("rect")
      .attr("x", (d) => -d._w / 2)
      .attr("y", (d) => -d._h / 2)
      .attr("width", (d) => d._w)
      .attr("height", (d) => d._h)
      .attr("rx", 16).attr("ry", 16)
      .attr("fill", "#ffffff")
      .attr("stroke", "#171717")
      .attr("stroke-width", 1);

    nodeG.append("text")
      .attr("text-anchor", "middle").attr("dominant-baseline", "central")
      .attr("font-size", measureFontSize).attr("font-weight", 450)
      .attr("fill", "#171717").attr("pointer-events", "none")
      .text((d) => d.id);

    function pathFor(d) {
      const sx = d.source.x, sy = d.source.y, tx = d.target.x, ty = d.target.y;
      const dx = tx - sx, dy = ty - sy;
      const dr = Math.sqrt(dx * dx + dy * dy) || 1;
      const trim = (cx, cy, ww, hh, fromX, fromY) => {
        const ddx = fromX - cx, ddy = fromY - cy;
        const ax = Math.abs(ddx), ay = Math.abs(ddy);
        const sxr = ww / 2, syr = hh / 2;
        const scale = (ax / sxr > ay / syr) ? sxr / ax : syr / ay;
        return [cx + ddx * scale, cy + ddy * scale];
      };
      const [sxT, syT] = trim(sx, sy, d.source._w, d.source._h, tx, ty);
      const [txT, tyT] = trim(tx, ty, d.target._w + 8, d.target._h + 8, sx, sy);
      if (Math.abs(d._curve) < 0.001) return `M${sxT},${syT}L${txT},${tyT}`;
      const mx = (sxT + txT) / 2, my = (syT + tyT) / 2;
      const nx = -(tyT - syT), ny = txT - sxT;
      const nlen = Math.sqrt(nx * nx + ny * ny) || 1;
      const cx = mx + (nx / nlen) * dr * d._curve * 0.4;
      const cy = my + (ny / nlen) * dr * d._curve * 0.4;
      return `M${sxT},${syT}Q${cx},${cy} ${txT},${tyT}`;
    }

    sim.on("tick", () => {
      nodes.forEach((n) => {
        n.x = Math.max(n._w / 2 + 4, Math.min(worldW - n._w / 2 - 4, n.x));
        n.y = Math.max(n._h / 2 + 4, Math.min(worldH - n._h / 2 - 4, n.y));
      });
      linkSel.attr("d", pathFor);
      labelSel.attr("transform", (d) => {
        const sx = d.source.x, sy = d.source.y, tx = d.target.x, ty = d.target.y;
        const mx = (sx + tx) / 2, my = (sy + ty) / 2;
        if (Math.abs(d._curve) < 0.001) return `translate(${mx},${my})`;
        const nx = -(ty - sy), ny = tx - sx;
        const nlen = Math.sqrt(nx * nx + ny * ny) || 1;
        const dr = Math.sqrt((tx - sx) ** 2 + (ty - sy) ** 2);
        return `translate(${mx + (nx / nlen) * dr * d._curve * 0.2},${my + (ny / nlen) * dr * d._curve * 0.2})`;
      });
      nodeG.attr("transform", (d) => `translate(${d.x},${d.y})`);
    });

    return () => sim.stop();
  }, [nodes, links, dims, isMobile]);

  return (
    <div ref={wrapperRef} className="relative w-full">
      <svg
        ref={svgRef}
        className="cld-canvas"
        width={dims.w}
        height={dims.h}
        style={{
          background: "#fafaf9",
          borderRadius: 4,
          border: "1px solid #e7e5e4",
          display: "block",
        }}
      />
      {nodes.length === 0 && (
        <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
          <p className="text-stone-400 text-sm">No diagram — add connections to begin.</p>
        </div>
      )}
    </div>
  );
});

const EXAMPLES = {

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function serializeSvg(svgNode) {
  if (!svgNode) return null;

  const clone = svgNode.cloneNode(true);

  const width = Number(svgNode.getAttribute("width")) || svgNode.clientWidth || 800;
  const height = Number(svgNode.getAttribute("height")) || svgNode.clientHeight || 500;

  clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
  clone.setAttribute("width", width);
  clone.setAttribute("height", height);
  clone.setAttribute("viewBox", `0 0 ${width} ${height}`);

  const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  bg.setAttribute("x", "0");
  bg.setAttribute("y", "0");
  bg.setAttribute("width", "100%");
  bg.setAttribute("height", "100%");
  bg.setAttribute("fill", "#fafaf9");
  clone.insertBefore(bg, clone.firstChild);

  const serializer = new XMLSerializer();
  let source = serializer.serializeToString(clone);

  if (!source.startsWith("<?xml")) {
    source = `<?xml version="1.0" encoding="UTF-8"?>\n${source}`;
  }

  return source;
}

function CopyButton({ text, label = "Copy" }) {
  const [copied, setCopied] = useState(false);

  const copy = async () => {
    try {
      await navigator.clipboard.writeText(text);
    } catch {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand("copy"); } catch {}
      document.body.removeChild(ta);
    }
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };

  return (
    <button
      onClick={copy}
      className="inline-flex items-center gap-1.5 px-2.5 py-1.5 text-xs font-medium border border-stone-300 rounded hover:border-stone-900 transition-colors bg-white"
    >
      {copied ? <Icon name="Check" size={11} color="#0f766e" /> : <Icon name="Copy" size={11} />}
      <span style={copied ? { color: "#0f766e" } : undefined}>{copied ? "Copied" : label}</span>
    </button>
  );
}

function GeneratorTab() {

  useEffect(() => { setParseResult(parseConnections(text)); }, [text]);

  useEffect(() => {

      if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false);
    };
    document.addEventListener("mousedown", onClick);
    document.addEventListener("touchstart", onClick);
    return () => {
      document.removeEventListener("mousedown", onClick);
      document.removeEventListener("touchstart", onClick);

  const loops = useMemo(() => findLoops(parseResult.edges), [parseResult.edges]);

    const nodes = new Set();
    parseResult.edges.forEach((e) => { nodes.add(e.source); nodes.add(e.target); });
    return {
      nodes: nodes.size,
      edges: parseResult.edges.length,
      reinforcing: loops.filter((l) => l.type === "R").length,
      balancing: loops.filter((l) => l.type === "B").length,
    };

  const exportSVG = () => {
    const svgNode = diagramRef.current?.getSvgNode();
    const svgText = serializeSvg(svgNode);

      const needs = /[",\n]/.test(s);
      const e = s.replace(/"/g, '""');
      return needs ? `"${e}"` : e;
    };
    const rows = [
      "from,to,polarity",
      ...parseResult.edges.map((e) => [escape(e.source), escape(e.target), escape(e.polarity)].join(",")),
    ];
    downloadBlob(new Blob([rows.join("\n")], { type: "text/csv" }), "cld.csv");
    setMenuOpen(false);
  };

  const exportRDA = () => {
    const bytes = writeRDA(parseResult.edges);
    downloadBlob(new Blob([bytes], { type: "application/octet-stream" }), "cld.rda");
    setMenuOpen(false);

  const exportLoopText = () => {

    downloadBlob(new Blob([txt], { type: "text/plain" }), "cld-loops.txt");

function AttrRow({ attr, required, example, desc }) {
  return (
    <tr className="border-b border-stone-100 last:border-b-0 align-top">
      <td className="p-3 mono text-xs text-stone-900 whitespace-nowrap">{attr}</td>
      <td className="p-3 text-stone-600 whitespace-nowrap">{required}</td>
      <td className="p-3 mono text-xs text-stone-700 whitespace-nowrap">{example}</td>
      <td className="p-3 text-stone-600 min-w-48">{desc}</td>
    </tr>
  );
}

function MiniRef({ label, value }) {
  return (
    <div className="border border-stone-200 rounded p-3 bg-white">
      <div className="mono text-xs text-stone-900 mb-1">{label}</div>
      <div className="text-sm text-stone-600">{value}</div>
    </div>
  );
}

function Stat({ label, value, accent }) {
  return (
    <div>
      <div className="text-xl sm:text-2xl font-medium tabular-nums" style={{ color: accent || "#171717" }}>
        {value}
      </div>
      <div className="text-[10px] uppercase tracking-[0.15em] text-stone-500 mt-0.5">{label}</div>
    </div>
  );
}

function ExportItem({ iconName, label, hint, onClick }) {
  return (
    <button
      onClick={onClick}
      className="w-full flex items-center gap-3 px-3 py-3 sm:py-2.5 hover:bg-stone-50 active:bg-stone-100 transition-colors text-left"
    >
      <span className="text-stone-600"><Icon name={iconName} size={13} /></span>
      <span className="flex-1">
        <span className="text-sm font-medium block">{label}</span>
        <span className="text-xs text-stone-500">{hint}</span>
      </span>
    </button>
  );
}

function LoopRow({ loop, index }) {
  const negCount = loop.polarities.filter((p) => p === "-").length;
  const isR = loop.type === "R";
  return (
    <li className="border-l-2 pl-3 sm:pl-4 py-1" style={{ borderColor: isR ? "#0f766e" : "#b91c1c" }}>
      <div className="flex items-baseline gap-2 sm:gap-3 flex-wrap">
        <span className="text-xs font-semibold tracking-wider tabular-nums" style={{ color: isR ? "#0f766e" : "#b91c1c" }}>
          {loop.type}{index}
        </span>
        <span className="text-xs uppercase tracking-wider text-stone-500">
          {isR ? "Reinforcing" : "Balancing"}
        </span>
        <span className="text-xs text-stone-400 ml-auto mono">
          {loop.nodes.length} vars · {negCount}−
        </span>
      </div>
      <div className="text-sm mt-1.5 leading-relaxed break-words">
        {loop.nodes.map((n, j) => (
          <span key={j}>
            <span>{n}</span>
            <span className="mx-1.5 mono text-xs" style={{ color: loop.polarities[j] === "+" ? "#0f766e" : "#b91c1c" }}>
              →{loop.polarities[j]}
            </span>
          </span>
        ))}
        <span className="text-stone-400 italic">{loop.nodes[0]}</span>
      </div>
    </li>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CLDGenerator />);
</script>
</body>
</html>
