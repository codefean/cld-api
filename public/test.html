<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLD Embed Test</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #171717;
      background: #ffffff;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
    }

    section {
      margin: 48px 0;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 12px;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 12px;
    }

    p {
      color: #57534e;
      line-height: 1.6;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: #f5f5f4;
      padding: 2px 5px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <main>
    <h1>CLD Embed Test</h1>

    <p>
      This page demonstrates the target embed syntax for the future
      <code>cld-generator.js</code> script.
    </p>

    <p>
      The data file is <code>/cld.csv</code>. Each diagram is selected by its
      <code>diagram</code> name.
    </p>

    <section>
      <h2>Forest Dieoff</h2>

      <cld-diagram
        src="/cld.csv"
        diagram="forest dieoff"
        height="520"
        downloads="svg,csv,txt">
      </cld-diagram>
    </section>

    <section>
      <h2>Bank Run</h2>

      <cld-diagram
        src="/cld.csv"
        diagram="bank run"
        height="480"
        downloads="svg,csv,txt">
      </cld-diagram>
    </section>

    <section>
      <h2>Burnout</h2>

      <cld-diagram
        src="/cld.csv"
        diagram="burnout"
        height="480"
        downloads="svg,csv,txt">
      </cld-diagram>
    </section>

<section>
  <h2>Programmatic Render Test</h2>
  <div id="programmatic-cld"></div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      CLDGenerator.render({
        container: "#programmatic-cld",
        dataUrl: "/cld.csv",
        diagram: "forest dieoff",
        height: 520,
        exports: ["svg", "csv", "txt"]
      });
    });
  </script>
</section>

    <script src="/cld-generator.js"></script>
  </main>
</body>
</html>
